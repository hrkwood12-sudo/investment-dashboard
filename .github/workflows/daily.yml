name: 毎朝の投資ダッシュボード更新

on:
  schedule:
    # 7:00 AM JST = 22:00 UTC (前日)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: ダッシュボード生成
        run: python generate_dashboard.py

      - name: 変更をコミット・プッシュ
        run: |
          git config --local user.email "dashboard-bot@github.com"
          git config --local user.name "Investment Dashboard Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "📊 ダッシュボード更新: $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')"
          git push
